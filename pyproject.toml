[tool.black]
line-length = 100
target-version = ["py313"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
exclude = [
  "^apps/",
  "^infra/",
]

[tool.pytest.ini_options]
testpaths = ["services", "packages/python-common/tests"]
addopts = ["--import-mode=importlib"]
pythonpath = [
  ".",
  "packages/python-common/src",
]
