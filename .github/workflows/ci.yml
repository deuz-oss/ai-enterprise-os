name: CI

on:
  push:
    branches: ["main", "deuz-oss-repo-structure-setup"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy pytest fastapi pydantic "uvicorn[standard]"

      - name: Python lint
        run: |
          ruff check services packages/python-common/src
          mypy services packages/python-common/src

      - name: Python tests
        run: pytest -q

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: JS lint and tests
        run: |
          npm run lint --if-present
          npm run test --if-present

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-service
          - organization-service
          - workflow-service
          - rules-service
          - audit-service
          - notification-service
          - knowledge-service
          - search-service
          - ai-gateway
          - api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build service image
        run: docker build -t ai-enterprise-os/${{ matrix.service }}:ci ./services/${{ matrix.service }}
