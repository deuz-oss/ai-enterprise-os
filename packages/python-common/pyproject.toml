[project]
name = "python-common"
version = "0.1.0"
description = "Shared python foundation package for AI Enterprise OS"
requires-python = ">=3.13"
dependencies = [
  "pydantic>=2.8.0",
  "sqlalchemy>=2.0.35",
  "structlog>=24.4.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
